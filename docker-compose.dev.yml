services:
  # PostgreSQL Database for Development
  postgres:
    image: postgres:16-alpine
    container_name: budget-tracker-dev-db
    environment:
      POSTGRES_DB: budget_tracker_dev
      POSTGRES_USER: dev_user
      POSTGRES_PASSWORD: dev_password
      POSTGRES_HOST_AUTH_METHOD: trust
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data
      - ./init-dev.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5433:5432" # Different port to avoid conflicts with production
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dev_user -d budget_tracker_dev"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - budget-dev-network

  # Budget Tracker Application for Development
  app:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: budget-tracker-dev-app
    environment:
      NODE_ENV: development
      PORT: 5001
      DATABASE_URL: postgresql://dev_user:dev_password@postgres:5432/budget_tracker_dev
      DB_USER: dev_user
      # Supabase configuration - set these in .env file or replace with actual values
      SUPABASE_URL: ${SUPABASE_URL}
      SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY}
      VITE_SUPABASE_URL: ${VITE_SUPABASE_URL}
      VITE_SUPABASE_ANON_KEY: ${VITE_SUPABASE_ANON_KEY}
    ports:
      - "5001:5001" # Different port for development
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - .:/app # Mount source code for hot reloading
      - /app/node_modules # Avoid overwriting node_modules
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5001"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - budget-dev-network

volumes:
  postgres_dev_data:
    driver: local

networks:
  budget-dev-network:
    driver: bridge
