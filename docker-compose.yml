services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: budget-tracker-db
    environment:
      POSTGRES_DB: budget_tracker
      POSTGRES_USER: budget_user
      POSTGRES_PASSWORD: budget_password
      POSTGRES_HOST_AUTH_METHOD: trust
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U budget_user -d budget_tracker"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - budget-network

  # Budget Tracker Application
  app:
    build: .
    container_name: budget-tracker-app
    environment:
      NODE_ENV: production
      PORT: 5000
      DATABASE_URL: postgresql://budget_user:budget_password@postgres:5432/budget_tracker
      DB_USER: budget_user
      # Supabase configuration - set these in .env file or replace with actual values
      SUPABASE_URL: ${SUPABASE_URL}
      SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY}
      VITE_SUPABASE_URL: ${VITE_SUPABASE_URL}
      VITE_SUPABASE_ANON_KEY: ${VITE_SUPABASE_ANON_KEY}
    ports:
      - "5002:5000"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - budget-network

volumes:
  postgres_data:
    driver: local

networks:
  budget-network:
    driver: bridge
